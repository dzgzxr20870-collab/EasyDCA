name: Test

# ทดสอบเท่านั้น — "ไม่ใช่" Deploy Pipeline (Railway มี GitHub Integration ของตัวเอง
# ที่ Deploy อัตโนมัติเมื่อ Push เข้า main อยู่แล้ว ดู docs/DEPLOYMENT.md § 5) CI เขียว
# ไม่ได้แปลว่า "ปลอดภัยที่จะ Deploy Migration" — นั่นยังเป็นขั้นตอน Manual ที่ต้องตั้งใจทำ
# แยกต่างหากเสมอ ตามกฎ "Migration ต้อง Apply ก่อน Code ที่พึ่งพามันเสมอ"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # backend/src/config/env.js's validateEnv() throw ทันทีตอน Import ถ้าตัวแปรที่จำเป็น
    # (REQUIRED_ENV_VARS) หายไป — เครื่อง Local ของทุกคนมี backend/.env (Gitignore ไว้ ไม่
    # Commit) อยู่แล้วมาตลอด แต่ GitHub Actions เป็นเครื่องสะอาดใหม่ไม่มี .env เลย ต้องตั้งค่า
    # ตรงนี้แทน — เป็นค่า Dummy ที่ Format ผ่านเท่านั้น "ไม่ใช่" Secret จริงจาก Production/
    # Staging ใดๆ ทั้งสิ้น (ปลอดภัยที่จะอยู่ใน Workflow File ซึ่งเป็น Public Repo History
    # ตลอดไป) ยืนยันแล้วว่า Test Suite ทั้งหมด Mock External Call จริงหมด (Supabase Client
    # ผ่าน jest.mock('../src/config/supabase'), LINE/Twelve Data/CoinGecko ผ่าน
    # jest.spyOn(global, 'fetch')) ไม่มี Test ไหนยิง Network จริงออกไปด้วยค่าพวกนี้
    env:
      NODE_ENV: test
      # 4 ตัวที่ validateEnv() บังคับจริง (REQUIRED_ENV_VARS)
      LINE_CHANNEL_SECRET: dummy_secret_for_ci
      LINE_CHANNEL_ACCESS_TOKEN: dummy_token_for_ci
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy_service_role_key_for_ci
      # ไม่ได้อยู่ใน REQUIRED_ENV_VARS (validateEnv ไม่บังคับ) แต่ใส่กันไว้เผื่อ Test ไหน
      # อ่านค่านี้ตรงๆ โดยไม่ได้ Mock config/env (ต้นทุนต่ำ ไม่มีผลเสีย)
      JWT_SECRET: dummy_jwt_secret_for_ci_testing_only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # npm ci (ไม่ใช่ npm install) — ใช้ package-lock.json ที่ Commit ไว้ตรงๆ ไม่แก้
      # Lockfile เงียบๆ ระหว่าง CI (backend/package-lock.json ถูก Commit ไว้ปกติ)
      - run: npm ci

      - run: npm test

  frontend-test:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # frontend/package-lock.json ไม่ได้ถูก Commit เข้า Repo "โดยตั้งใจ" (ไม่ใช่ปัญหาค้าง
      # ที่รอแก้) — Commit 6ebd4ba ลบออกไปแล้วเลือกใช้ npm install แทนอย่างถาวร เพราะเคย
      # Regenerate Lockfile บน Windows แล้วขาด Optional Dependency ของแพลตฟอร์ม Linux
      # (@esbuild/@rollup Binaries) ทำให้ Railway Build Fail — Railway Service ฝั่ง
      # Frontend จริงก็ตั้งค่า Build Command เป็น npm install (ไม่ใช่ npm ci) มาตั้งแต่ตอนนั้น
      # และทำงานได้ปกติมาตลอด CI ที่นี่จึงจำลองพฤติกรรมเดียวกับที่ Deploy จริงใช้ ไม่ใช่บังคับ
      # npm ci ที่ขัดกับการตัดสินใจที่ทำไปแล้ว — ไม่มี Lockfile ให้ Cache อ้างอิงจึงไม่ตั้ง
      # cache: npm ให้ Step setup-node ด้านบน (Job นี้แค่ไม่มี npm Cache ช้ากว่าเล็กน้อย
      # แต่ถูกต้องกว่าพยายาม Cache ไฟล์ที่ไม่มีอยู่จริง)
      - run: npm install

      - run: npm test

  migration-numbering-check:
    name: Migration filename numbering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ตรวจแค่ "ชื่อไฟล์ไม่ชนกัน" (เลขนำหน้าไม่ซ้ำ + Zero-padding เท่ากัน) ไม่ได้ตรวจ
      # เนื้อหา SQL ว่ารันได้จริงไหม — เหตุผลที่ตรวจแค่นี้ ดู
      # .github/scripts/check-migration-numbering.js และ docs/DEPLOYMENT.md § 5.1
      - run: node .github/scripts/check-migration-numbering.js
